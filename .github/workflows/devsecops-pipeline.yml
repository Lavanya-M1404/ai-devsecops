name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

    # 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. SAST - Bandit
    - name: Install Bandit
      run: pip install bandit

    - name: Run SAST
      run: bandit -r . -ll || true

    # 4. Install Trivy (stable way)
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        LATEST=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | grep tag_name | cut -d '"' -f 4)
        wget https://github.com/aquasecurity/trivy/releases/download/${LATEST}/trivy_${LATEST#v}_Linux-64bit.deb
        sudo dpkg -i trivy_${LATEST#v}_Linux-64bit.deb

    # 5. SCA Scan
    - name: Run SCA Scan
      run: |
        trivy fs . \
        --scanners vuln \
        --severity HIGH,CRITICAL \
        --exit-code 0

    # 6. Install Syft (FIXED)
    - name: Install Syft
      run: |
        SYFT_VERSION=$(curl -s https://api.github.com/repos/anchore/syft/releases/latest | grep tag_name | cut -d '"' -f 4)
        wget https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${SYFT_VERSION#v}_linux_amd64.tar.gz
        tar -xzf syft_${SYFT_VERSION#v}_linux_amd64.tar.gz
        sudo mv syft /usr/local/bin/
        syft version

    # 7. Generate SBOM
    - name: Generate SBOM
      run: syft dir:. -o json > sbom.json

    # 8. Upload SBOM
    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

    # 9. Build Docker Image
    - name: Build Docker Image
      run: docker build -t ai-service:latest ./ai-service

    # 10. Container Scan
    - name: Run Container Scan
      run: |
        trivy image ai-service:latest \
        --scanners vuln \
        --severity HIGH,CRITICAL \
        --exit-code 0

    # 11. Login to DockerHub (only if secrets exist)
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 12. Tag Image
    - name: Tag Image
      run: docker tag ai-service:latest ${{ secrets.DOCKER_USERNAME }}/ai-service:latest

    # 13. Push Image
    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-service:latest

    # 🚫 14. Kubernetes Deployment (DISABLED FOR NOW)
    - name: Skip Deployment (Minikube not accessible)
      run: echo "Skipping Kubernetes deploy - requires cloud cluster"