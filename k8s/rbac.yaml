apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-sa

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-binding
subjects:
- kind: ServiceAccount
  name: ai-sa
roleRef:
  kind: Role
  name: ai-role
  apiGroup: rbac.authorization.k8s.io